<div class="w-full space-y-6">
  <header
    class="flex items-center justify-between rounded-2xl border border-slate-200 bg-sky-50/80 px-6 py-3 shadow-sm shadow-sky-100"
  >
    <div class="flex items-center gap-6">
      <span class="text-sm font-semibold tracking-tight text-slate-900">
        Meran
      </span>
      <nav class="flex items-center gap-4 text-sm">
        <a
          routerLink="/dashboard"
          routerLinkActive="border-sky-500 ring-1 ring-sky-300 bg-sky-50 text-slate-900"
          [routerLinkActiveOptions]="{ exact: true }"
          class="inline-flex items-center rounded-full bg-white px-4 py-3 text-xs font-medium text-slate-700 border border-transparent shadow-sm hover:border-sky-200 hover:bg-sky-50"
          (click)="showUsersMenu = false"
        >
          Dashboard
        </a>
        <a
          routerLink="/applications"
          routerLinkActive="border-sky-500 ring-1 ring-sky-300 bg-sky-50 text-slate-900"
          class="inline-flex items-center rounded-full bg-white px-4 py-3 text-xs font-medium text-slate-700 border border-transparent shadow-sm hover:border-sky-200 hover:bg-sky-50"
          (click)="showUsersMenu = false"
        >
          Applications
        </a>
        <div
          class="relative flex items-center gap-2"
          routerLinkActive="border-sky-500 ring-1 ring-sky-300 bg-sky-50 text-slate-900"
          [routerLinkActiveOptions]="{ exact: false }"
        >
          <button
            type="button"
            class="inline-flex items-center rounded-full bg-white px-4 py-1.5 text-xs font-medium text-slate-700 border border-transparent shadow-sm hover:border-sky-200 hover:bg-sky-50"
            (click)="toggleUsersMenu()"
          >
            Utilisateurs
            <span class="ml-1 text-[20px] text-slate-500">
              ▾
            </span>
          </button>
          <div
            *ngIf="showUsersMenu"
            class="absolute top-full right-0 mt-2 w-64 rounded-2xl border border-slate-200 bg-white py-2 shadow-lg shadow-slate-900/10"
          >
            <p class="px-3 pb-1 text-[11px] font-medium uppercase tracking-wide text-slate-400">
              Applications
            </p>
            <button
              *ngFor="let app of applications$ | async"
              type="button"
              class="flex w-full items-start gap-2 px-3 py-1.5 text-left text-[11px] text-slate-700 hover:bg-sky-50"
              [routerLink]="['/users', 'applications', app.id]"
              routerLinkActive="bg-sky-50 text-sky-700"
              (click)="showUsersMenu = false"
            >
              <span
                class="mt-0.5 inline-flex h-5 w-5 flex-none items-center justify-center rounded-full bg-sky-100 text-[10px] font-semibold text-sky-700"
              >
                {{ app.name.charAt(0) }}
              </span>
              <span class="flex-1">
                <span class="block font-medium">
                  {{ app.name }}
                </span>
                <span class="block text-[10px] text-slate-400 truncate">
                  {{ app.id }}
                </span>
              </span>
            </button>
          </div>
        </div>
        <a
          routerLink="/revenus"
          routerLinkActive="border-sky-500 ring-1 ring-sky-300 bg-sky-50 text-slate-900"
          class="inline-flex items-center rounded-full bg-white px-4 py-3 text-xs font-medium text-slate-700 border border-transparent shadow-sm hover:border-sky-200 hover:bg-sky-50"
          (click)="showUsersMenu = false"
        >
          Revenus
        </a>
      </nav>
    </div>

    <button
      type="button"
      class="inline-flex items-center rounded-xl border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 shadow-sm hover:bg-slate-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sky-400 focus-visible:ring-offset-2 focus-visible:ring-offset-sky-50"
      (click)="onLogout()"
    >
      Déconnexion
    </button>
  </header>

  <main class="w-full max-w-6xl mx-auto">
    <router-outlet></router-outlet>
  </main>
</div>
